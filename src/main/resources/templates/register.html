<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .card {
      width: 420px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      color: white;
    }

    .form-control {
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
    }

    .form-control::placeholder { color: #ddd; }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: left;
      display: none;
    }

    .success {
      color: #00ffae;
      font-size: 13px;
      text-align: left;
      display: none;
    }

    .strength {
      height: 5px;
      border-radius: 5px;
      margin-top: 5px;
      width: 0%;
    }

    .password-wrapper { position: relative; }

    .toggle-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .btn-custom {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border: none;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="card text-center">
  <h2>Create Account ✨</h2>

  <form id="registerForm" action="/register" method="post">

    <input class="form-control my-2" name="name" placeholder="Full Name" required>

    <input class="form-control my-2" id="email" name="email" placeholder="Email" required>
    <div id="emailError" class="error">Invalid email</div>

    <div class="password-wrapper">
      <input class="form-control my-2" id="password" name="password" type="password" placeholder="Password" required>
      <span class="toggle-eye" onclick="togglePassword('password')">👁️</span>
      <div class="strength" id="strengthBar"></div>
    </div>

    <div class="password-wrapper">
      <input class="form-control my-2" id="confirmPassword" type="password" placeholder="Confirm Password" required>
      <span class="toggle-eye" onclick="togglePassword('confirmPassword')">👁️</span>
    </div>

    <div id="passError" class="error">Passwords do not match</div>
    <div id="passSuccess" class="success">Passwords match ✓</div>

    <select name="role" class="form-control my-2">
      <option value="STUDENT">👨‍🎓 Student</option>
      <option value="FACULTY">👨‍🏫 Faculty</option>
      <option value="COMPANY">🏢 Company</option>
    </select>

    <button class="btn btn-custom w-100 mt-3">Register</button>
  </form>

  <p class="mt-3">Already have account? <a href="/login">Login</a></p>
</div>

<script>
  // Email validation
  const email = document.getElementById('email');
  const emailError = document.getElementById('emailError');

  email.addEventListener('input', () => {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regex.test(email.value)) {
      emailError.style.display = 'block';
    } else {
      emailError.style.display = 'none';
    }
  });

  // Password strength
  const password = document.getElementById('password');
  const strengthBar = document.getElementById('strengthBar');

  password.addEventListener('input', () => {
    let val = password.value;
    let strength = 0;

    if (val.length > 5) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const widths = ["0%","25%","50%","75%","100%"];
    const colors = ["red","red","orange","yellow","green"];

    strengthBar.style.width = widths[strength];
    strengthBar.style.background = colors[strength];
  });

  // Toggle password
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // Confirm password match
  const confirmPassword = document.getElementById('confirmPassword');
  const passError = document.getElementById('passError');
  const passSuccess = document.getElementById('passSuccess');

  confirmPassword.addEventListener('input', () => {
    if (confirmPassword.value !== password.value) {
      passError.style.display = 'block';
      passSuccess.style.display = 'none';
    } else {
      passError.style.display = 'none';
      passSuccess.style.display = 'block';
    }
  });

  // Final validation
  const form = document.getElementById('registerForm');
  form.addEventListener('submit', function(e) {
    if (password.value !== confirmPassword.value || emailError.style.display === 'block') {
      e.preventDefault();
    }
  });
</script>

</body>
</html>
