<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Campus Chat</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:#111b21;
            color:white;
            display:flex;
            height:100vh;
            overflow:hidden;
        }

        /* LEFT PANEL */
        .sidebar{
            width:320px;
            background:#202c33;
            display:flex;
            flex-direction:column;
        }

        /* HEADER */
        .sidebar-header{
            padding:15px;
            background:#111b21;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        /* SEARCH */
        .search{
            padding:10px;
            background:#202c33;
        }
        .search input{
            width:100%;
            padding:8px;
            border-radius:8px;
            border:none;
        }

        /* USER LIST */
        .user{
            display:flex;
            align-items:center;
            gap:10px;
            padding:12px;
            cursor:pointer;
            transition:0.3s;
            border-bottom:1px solid #2a3942;
        }

        .user:hover{
            background:#2a3942;
        }

        .user.active{
            background:#2a3942;
        }

        .avatar{
            width:40px;
            height:40px;
            border-radius:50%;
            background:#22c55e;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }

        /* RIGHT CHAT */
        .chat-area{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        /* CHAT HEADER */
        .chat-header{
            background:#202c33;
            padding:15px;
            display:flex;
            align-items:center;
            gap:10px;
        }

        /* CHAT BOX */
        .chat-box{
            flex:1;
            overflow-y:auto;
            padding:20px;
            background:#0b141a;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        /* MESSAGE */
        .msg{
            padding:10px 15px;
            border-radius:12px;
            max-width:60%;
            position:relative;
            font-size:14px;
        }

        .left{
            background:#202c33;
            align-self:flex-start;
        }

        .right{
            background:#005c4b;
            align-self:flex-end;
        }

        .time{
            font-size:10px;
            opacity:0.7;
            display:block;
            margin-top:4px;
            text-align:right;
        }

        /* INPUT */
        .input-area{
            display:flex;
            padding:10px;
            background:#202c33;
        }

        .input-area input{
            flex:1;
            border:none;
            border-radius:8px;
            padding:10px;
        }

        .send-btn{
            background:#22c55e;
            border:none;
            margin-left:5px;
            border-radius:8px;
        }

        /* EMOJI */
        .emoji{
            cursor:pointer;
            margin-right:5px;
        }
    </style>

</head>

<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
        <h6>💬 Chats</h6>
        <i class="fa fa-ellipsis-v"></i>
    </div>

    <div class="search">
        <input placeholder="Search or start new chat">
    </div>

    <!-- USERS -->
    <div class="user active">
        <div class="avatar">S</div>
        <div>
            <div>Student</div>
            <small>Hey there 👋</small>
        </div>
    </div>

    <div class="user">
        <div class="avatar">F</div>
        <div>
            <div>Faculty</div>
            <small>Meeting update</small>
        </div>
    </div>

    <div class="user">
        <div class="avatar">C</div>
        <div>
            <div>Company</div>
            <small>Job offer</small>
        </div>
    </div>

</div>

<!-- RIGHT CHAT -->
<div class="chat-area">

    <div class="chat-header">
        <div class="avatar">S</div>
        <div>
            <strong>Student</strong><br>
            <small style="color:#22c55e;">Online</small>
        </div>
    </div>

    <form action="/send" method="post">

        <input name="sender" placeholder="Your Name" class="form-control my-1" required>
        <input name="receiver" placeholder="Receiver" class="form-control my-1" required>

        <div class="chat-box">

            <div th:each="m : ${messages}"
                 th:classappend="${m.sender == 'Roushan'} ? 'msg right' : 'msg left'">

                <span th:text="${m.content}"></span>
                <span class="time">12:30</span>

            </div>

        </div>

        <div class="input-area">

            <span class="emoji" onclick="addEmoji('😊')">😊</span>
            <span class="emoji" onclick="addEmoji('🔥')">🔥</span>
            <span class="emoji" onclick="addEmoji('👍')">👍</span>

            <input id="msgInput" name="content" placeholder="Type message..." required>

            <button class="btn send-btn">
                <i class="fa fa-paper-plane"></i>
            </button>

        </div>

    </form>

</div>

<script>
    function addEmoji(e){
        let input=document.getElementById("msgInput");
        input.value+=e;
        input.focus();
    }
</script>

</body>
</html>
