<!DOCTYPE html>
<html>
<head>
    <title>CampusConnect Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Floating background */
        .bg span {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: float 20s linear infinite;
        }

        .bg span:nth-child(1){left:10%;animation-duration:18s}
        .bg span:nth-child(2){left:30%;animation-duration:22s}
        .bg span:nth-child(3){left:60%;animation-duration:16s}
        .bg span:nth-child(4){left:80%;animation-duration:25s}

        @keyframes float {
            0%{transform:translateY(100vh)}
            100%{transform:translateY(-10vh)}
        }

        .login-box {
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transform: scale(1.02);
        }

        .btn-primary {
            border-radius: 10px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        a {
            color: #00e6ff;
            text-decoration: none;
        }

        a:hover { text-decoration: underline; }

        /* Password eye */
        .password-wrapper {
            position: relative;
        }

        .toggle-eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ddd;
        }

        /* Loading */
        .loading {
            display: none;
        }

        /* Shake animation */
        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

    </style>
</head>

<body>

<div class="bg">
    <span></span><span></span><span></span><span></span>
</div>

<div class="login-box" id="loginBox">

    <h3>CampusConnect</h3>

    <form id="loginForm" action="/login" method="post">

        <input class="form-control my-2" name="email" placeholder="Email" required>

        <div class="password-wrapper">
            <input class="form-control my-2" id="password" name="password" type="password" placeholder="Password" required>
            <span class="toggle-eye" onclick="togglePassword()">👁️</span>
        </div>

        <button class="btn btn-primary w-100 mt-2" id="loginBtn">
            <span id="btnText">Login</span>
            <span class="spinner-border spinner-border-sm loading" id="loader"></span>
        </button>

        <p class="text-danger mt-2 text-center" th:text="${error}"></p>

    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="/register">Register</a>
    </p>

</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    const form = document.getElementById('loginForm');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const box = document.getElementById('loginBox');

    form.addEventListener('submit', function() {
        loader.style.display = 'inline-block';
        btnText.innerText = 'Logging in...';
    });

    // Optional: shake on error (Thymeleaf error exists)
    window.onload = function() {
        const errorText = document.querySelector('.text-danger');
        if(errorText && errorText.innerText.trim() !== '') {
            box.classList.add('shake');
        }
    };
</script>

</body>
</html>
