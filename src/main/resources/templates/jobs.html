<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Jobs</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:#0f172a;
            color:white;
            overflow-x:hidden;
        }

        /* 🌌 Animated background particles */
        canvas{
            position:fixed;
            top:0;
            left:0;
            z-index:-1;
        }

        /* HEADER */
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin:40px auto 20px;
            max-width:900px;
        }

        /* BUTTON */
        .btn-add{
            background:linear-gradient(45deg,#6366f1,#8b5cf6);
            border:none;
            border-radius:12px;
            color:white;
            transition:0.3s;
        }

        .btn-add:hover{
            transform:scale(1.1) rotate(-2deg);
        }

        /* JOB CARD */
        .job-card{
            max-width:900px;
            margin:auto;
            margin-bottom:20px;
            padding:22px;
            border-radius:20px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            transition:0.4s;
            position:relative;
            overflow:hidden;
        }

        /* Shine effect */
        .job-card::after{
            content:"";
            position:absolute;
            top:0;
            left:-100%;
            width:100%;
            height:100%;
            background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
            transition:0.6s;
        }

        .job-card:hover::after{
            left:100%;
        }

        .job-card:hover{
            transform:translateY(-10px) scale(1.03);
        }

        /* TITLE */
        .title{
            font-size:20px;
            font-weight:600;
        }

        /* COMPANY */
        .company{
            font-size:14px;
            color:#38bdf8;
            display:flex;
            align-items:center;
            gap:6px;
        }

        /* DESCRIPTION */
        .desc{
            font-size:14px;
            color:#cbd5f5;
            margin-top:10px;
        }

        /* APPLY BUTTON */
        .btn-apply{
            background:linear-gradient(45deg,#10b981,#22c55e);
            border:none;
            border-radius:12px;
            padding:8px 16px;
            transition:0.3s;
        }

        .btn-apply:hover{
            transform:scale(1.15);
        }

        /* FLOATING ICON */
        .arrow{
            transition:0.3s;
        }

        .job-card:hover .arrow{
            transform:translateX(8px);
        }
    </style>

</head>

<body>

<!-- PARTICLE CANVAS -->
<canvas id="bg"></canvas>

<!-- HEADER -->
<div class="header">

    <h3>🚀 Available Jobs</h3>

    <a href="/add-job" class="btn btn-add">
        + Add Job
    </a>

</div>

<!-- JOB LIST -->
<div th:each="job : ${jobs}" class="job-card">

    <div class="title" th:text="${job.title}">Job Title</div>

    <div class="company">
        <i class="fa fa-building"></i>
        <span th:text="${job.company}">Company</span>
    </div>

    <div class="desc" th:text="${job.description}"></div>

    <div class="mt-3 d-flex justify-content-between align-items-center">

        <a th:href="@{'/apply/' + ${job.title}}"
           class="btn btn-apply text-white">
            Apply 🚀
        </a>

        <i class="fa fa-arrow-right arrow"></i>

    </div>

</div>

<script>
    // 🌌 Particle animation
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles=[];

    for(let i=0;i<80;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*2,
            dx:(Math.random()-0.5),
            dy:(Math.random()-0.5)
        });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        particles.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle="#6366f1";
            ctx.fill();

            p.x+=p.dx;
            p.y+=p.dy;

            if(p.x<0||p.x>canvas.width) p.dx*=-1;
            if(p.y<0||p.y>canvas.height) p.dy*=-1;
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
