<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profiles</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(120deg,#1d2671,#c33764);
            color:white;
            overflow-x:hidden;
        }

        /* 🌈 animated bg */
        body::before{
            content:"";
            position:fixed;
            width:200%;
            height:200%;
            background:linear-gradient(45deg,#6366f1,#8b5cf6,#ec4899,#f43f5e);
            animation:bgMove 12s infinite linear;
            z-index:-1;
            opacity:0.2;
        }

        @keyframes bgMove{
            0%{transform:translate(0,0)}
            50%{transform:translate(-20%,-20%)}
            100%{transform:translate(0,0)}
        }

        /* CARD */
        .card{
            border-radius:20px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            text-align:center;
            transition:0.4s;
            padding:20px;
            position:relative;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        /* glow hover */
        .card::before{
            content:"";
            position:absolute;
            width:150%;
            height:150%;
            background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);
            top:-50%;
            left:-50%;
            opacity:0;
            transition:0.5s;
        }

        .card:hover::before{
            opacity:1;
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
        }

        /* IMAGE */
        .profile-img{
            width:110px;
            height:110px;
            border-radius:50%;
            object-fit:cover;
            margin-top:10px;
            border:3px solid rgba(255,255,255,0.7);
            transition:0.3s;
        }

        .profile-img:hover{
            transform:scale(1.1) rotate(3deg);
        }

        /* NAME */
        h5{
            font-weight:600;
            margin-top:10px;
        }

        /* SKILLS */
        .skills{
            font-size:13px;
            color:#e0e7ff;
        }

        /* BIO */
        .bio{
            font-size:13px;
            opacity:0.9;
        }

        /* HEADER */
        h3{
            font-weight:600;
            letter-spacing:1px;
            animation:fadeIn 0.6s ease;
        }

        /* BUTTON */
        .btn-custom{
            border-radius:12px;
            background:linear-gradient(45deg,#6366f1,#8b5cf6);
            color:white;
            border:none;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:scale(1.08);
        }

        /* ENTRY ANIMATION */
        @keyframes fadeIn{
            from{opacity:0; transform:translateY(20px)}
            to{opacity:1; transform:translateY(0)}
        }

        /* CARD ANIMATION */
        .col-md-4{
            animation:fadeIn 0.6s ease;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <h3 class="mb-4 text-center">👥 Student Profiles</h3>

    <div class="row">

        <div class="col-md-4" th:each="p : ${profiles}">
            <div class="card my-3">

                <!-- IMAGE SAFE -->
                <img th:src="@{'/uploads/' + ${p.image}}"
                     class="profile-img"
                     onerror="this.src='https://via.placeholder.com/100'">

                <!-- NAME -->
                <h5 th:text="${p.name}">Name</h5>

                <!-- SKILLS -->
                <p class="skills">
                    <b>Skills:</b> <span th:text="${p.skills}"></span>
                </p>

                <!-- BIO -->
                <p class="bio" th:text="${p.bio}"></p>

            </div>
        </div>

    </div>

    <!-- BACK BUTTON -->
    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-custom px-4 py-2">
            ⬅ Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
