<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* 🌈 Animated Background */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,#667eea,#764ba2,#00c6ff,#10b981);
            animation: bgMove 12s infinite linear;
            z-index: -1;
        }

        @keyframes bgMove {
            0% {transform: translate(0,0);}
            50% {transform: translate(-25%,-25%);}
            100% {transform: translate(0,0);}
        }

        /* FORM */
        .form-box {
            width: 440px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        h3 {
            font-weight: 600;
        }

        /* INPUT FIX */
        input, textarea {
            border-radius: 10px !important;
            border: none !important;
            padding: 10px;
            position: relative;
            z-index: 2; /* 🔥 IMPORTANT FIX */
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* BUTTON */
        .btn-custom {
            background: linear-gradient(45deg,#00c6ff,#6366f1);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }

    </style>
</head>

<body>

<div class="form-box">

    <h3 class="text-center mb-3">💼 Post a Job</h3>

    <form action="/add-job" method="post">

        <input class="form-control my-2" name="title" placeholder="Job Title" required>

        <input class="form-control my-2" name="company" placeholder="Company Name" required>

        <textarea class="form-control my-2" name="description" placeholder="Job Description" required></textarea>

        <button class="btn btn-custom w-100 mt-2">
            🚀 Post Job
        </button>

    </form>

</div>

</body>
</html>
