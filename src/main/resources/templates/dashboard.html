<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CampusConnect Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(120deg,#eef2ff,#f8fafc);
            color:#1e293b;
            display:flex;
        }

        .sidebar{
            width:230px;
            height:100vh;
            background:white;
            padding:20px;
            position:fixed;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .sidebar a{
            display:flex;
            align-items:center;
            gap:10px;
            padding:12px;
            margin-bottom:10px;
            border-radius:12px;
            text-decoration:none;
            color:inherit;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#eef2ff;
            transform:translateX(5px);
        }

        .main{
            margin-left:250px;
            padding:30px;
            width:100%;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .card{
            border-radius:18px;
            padding:22px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,0.06);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px) scale(1.02);
        }

        .stat{
            font-size:32px;
            font-weight:600;
            color:#6366f1;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
        }

        .chart{
            height:260px;
        }

        .chat-btn{
            position:fixed;
            bottom:20px;
            right:20px;
            width:60px;
            height:60px;
            border-radius:50%;
            background:linear-gradient(45deg,#6366f1,#4f46e5);
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>🚀 Campus</h4>
    <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
    <a href="/jobs"><i class="fa fa-briefcase"></i> Jobs</a>
    <a href="/add-job"><i class="fa fa-plus"></i> Add Job</a>
    <a href="/chat"><i class="fa fa-comments"></i> Chat</a>
    <a href="/profile"><i class="fa fa-user"></i> Profile</a>
</div>

<div class="main">

    <div class="navbar">
        <h4>Placement Analytics</h4>
        <div>
            <span class="me-3">👤 <b th:text="${role}">Student</b></span>
            <i class="fa fa-bell me-3"></i>
            <i class="fa fa-user"></i>
        </div>
    </div>

    <!-- STATS -->
    <div class="grid mb-4">

        <div class="card text-center">
            <h6>Total Jobs</h6>
            <div class="stat" id="jobs">0</div>
        </div>

        <div class="card text-center">
            <h6>Total Applications</h6>
            <div class="stat" id="apps">0</div>
        </div>

    </div>

    <!-- ANALYTICS -->
    <div class="row mb-4">

        <div class="col-md-6">
            <div class="card chart">
                <h6>📈 Yearly Trend (Jobs vs Applications)</h6>
                <canvas id="chart1"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card chart">
                <h6>📊 Jobs vs Applications Ratio</h6>
                <canvas id="chart2"></canvas>
            </div>
        </div>

    </div>

    <!-- 🏢 NEW SECTION -->
    <div class="row mb-4">

        <div class="col-md-6">
            <div class="card">
                <h6 class="mb-3">🏢 Top Hiring Companies</h6>

                <ul class="list-group">
                    <li class="list-group-item d-flex justify-content-between">TCS <span>120</span></li>
                    <li class="list-group-item d-flex justify-content-between">Infosys <span>95</span></li>
                    <li class="list-group-item d-flex justify-content-between">Wipro <span>80</span></li>
                    <li class="list-group-item d-flex justify-content-between">Accenture <span>70</span></li>
                </ul>

            </div>
        </div>

        <div class="col-md-6">
            <div class="card chart">
                <h6>💰 Salary Distribution (LPA)</h6>
                <canvas id="chart3"></canvas>
            </div>
        </div>

    </div>

</div>

<a href="/chat" class="chat-btn">
    <i class="fa fa-comment"></i>
</a>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    const jobsCount = /*[[${jobsCount}]]*/ 0;
    const applicationsCount = /*[[${applicationsCount}]]*/ 0;

    /* YEARLY DATA */
    function generateYearData(total){
        let data=[];
        for(let i=1;i<=12;i++){
            data.push(Math.floor(total*(i/12)));
        }
        return data;
    }

    /* LINE CHART */
    new Chart(document.getElementById('chart1'),{
        type:'line',
        data:{
            labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
            datasets:[
                {
                    label:'Jobs',
                    data:generateYearData(jobsCount),
                    borderColor:'#6366f1',
                    backgroundColor:'rgba(99,102,241,0.1)',
                    fill:true,
                    tension:0.4
                },
                {
                    label:'Applications',
                    data:generateYearData(applicationsCount),
                    borderColor:'#10b981',
                    backgroundColor:'rgba(16,185,129,0.1)',
                    fill:true,
                    tension:0.4
                }
            ]
        }
    });

    /* DONUT */
    new Chart(document.getElementById('chart2'),{
        type:'doughnut',
        data:{
            labels:['Jobs','Applications'],
            datasets:[{
                data:[jobsCount,applicationsCount],
                backgroundColor:['#6366f1','#10b981']
            }]
        }
    });

    /* SALARY GRAPH */
    new Chart(document.getElementById('chart3'),{
        type:'bar',
        data:{
            labels:['3-5 LPA','5-8 LPA','8-12 LPA','12+ LPA'],
            datasets:[{
                data:[40,60,25,10],
                backgroundColor:'#6366f1'
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });

    /* COUNTER */
    function animate(id,val){
        let el=document.getElementById(id);
        let c=0;
        let i=setInterval(()=>{
            c+=val/30;
            if(c>=val){c=val;clearInterval(i)}
            el.innerText=Math.floor(c);
        },30);
    }

    window.onload=function(){
        animate('jobs',jobsCount);
        animate('apps',applicationsCount);
    }

</script>

</body>
</html>
